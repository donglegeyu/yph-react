    <style>
      svg[class*="icon"], svg[class*="Icon"], svg[fill="none"], svg[class*="menu-icon"] {
        stroke: currentColor !important;
        fill: none !important;
      }
      svg use {
        stroke: currentColor !important;
        fill: inherit !important;
      }
      svg symbol * {
        stroke: currentColor !important;
        fill: inherit !important;
      }
      [stroke] {
