services:
  mysql:
    image: mysql:8.0
    container_name: material-mysql-react
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: material_system_react
    volumes:
      - mysql-react-data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --character-set-client-handshake=FALSE
      - --default-authentication-plugin=mysql_native_password

  backend:
    image: material-backend-react:latest
    container_name: material-backend-react
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/material_system_react?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    depends_on:
      - mysql

volumes:
  mysql-react-data:
    name: material-mysql-react-data
