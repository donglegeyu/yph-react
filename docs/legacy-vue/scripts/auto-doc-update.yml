name: 自动文档更新

on:
  push:
    branches:
      - '**'  # 所有分支
    paths:
      - 'material-system-server/src/main/java/**/*.java'
      - 'material-system/src/**/*.vue'
      - 'material-system/src/**/*.ts'
      - 'docs/**'
  pull_request:
    branches:
      - '**'  # 所有分支
  workflow_dispatch:

jobs:
  # ==================== 后端文档更新 ====================
  backend-doc-update:
    name: 更新后端文档
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: 生成 API 文档
        run: |
          cd material-system-server
          mvn springdoc-openapi:dossier

      - name: 复制 Swagger JSON
        run: |
          mkdir -p docs/generated
          cp material-system-server/target/api-docs.json docs/generated/ || true

      - name: 更新 API 文档
        run: |
          if [ -f docs/generated/api-docs.json ]; then
            python3 scripts/generate_api_docs.py \
              --input docs/generated/api-docs.json \
              --output docs/API手册.md
          fi

      - name: 提交文档更新
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: 自动更新后端API文档"
          file_pattern: |
            docs/API手册.md
            docs/generated/*.json

  # ==================== 前端文档更新 ====================
  frontend-doc-update:
    name: 更新前端文档
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: material-system/package-lock.json

      - name: 安装依赖
        run: |
          cd material-system
          npm ci

      - name: 生成 Storybook 静态文件
        run: |
          cd material-system
          npm run build-storybook || true

      - name: 更新组件文档索引
        run: |
          python3 scripts/generate_component_docs.py \
            --input material-system/src/components \
            --output docs/generated/components.json

      - name: 提交文档更新
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: 自动更新前端组件文档"
          file_pattern: |
            docs/generated/components.json

  # ==================== 更新开发手册 ====================
  update-dev-handbook:
    name: 更新开发手册
    runs-on: ubuntu-latest
    needs: [backend-doc-update, frontend-doc-update]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 创建数据库文档占位文件
        run: |
          if [ ! -f docs/generated/database.md ]; then
            echo "# 数据库文档" > docs/generated/database.md
            echo "数据库文档将在后续版本中自动生成" >> docs/generated/database.md
          fi

      - name: 生成完整的开发手册
        run: |
          python3 scripts/merge_docs.py \
            --backend docs/API手册.md \
            --frontend docs/generated/components.json \
            --database docs/generated/database.md \
            --output docs/开发手册.md

      - name: 检查文档变更
        id: check-changes
        run: |
          if git diff --name-only | grep -q "docs/开发手册.md"; then
            echo "DOCS_UPDATED=true" >> $GITHUB_ENV
          else
            echo "DOCS_UPDATED=false" >> $GITHUB_ENV
          fi

      - name: 提交文档更新
        if: env.DOCS_UPDATED == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: 自动更新开发手册"
          file_pattern: docs/开发手册.md

  # ==================== 生成变更报告 ====================
  generate-changelog:
    name: 生成变更报告
    runs-on: ubuntu-latest
    needs: [update-dev-handbook]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 生成变更报告
        run: |
          git log --oneline -10 > docs/generated/changelog.txt || true

      - name: 创建 Pull Request 注释
        if: github.event_name == 'pull_request'
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          COMMENT="## 📚 文档自动更新报告

          本次提交已自动更新以下文档：

          - ✅ API手册 (Swagger)
          - ✅ 数据库文档 (DDL)
          - ✅ 前端组件文档 (Storybook)
          - ✅ 开发手册 (完整合并)

          查看更新: [开发手册](docs/开发手册.md)
          查看API文档: http://localhost:8080/swagger-ui.html
          查看组件文档: http://localhost:6006

          *此报告由 GitHub Actions 自动生成*"

          echo "$COMMENT" > pr-comment.txt
          # 这里需要 GitHub CLI 或其他方式添加评论，暂时跳过

      - name: 提交变更报告
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: 生成变更报告"
          file_pattern: docs/generated/changelog.txt
