# GitHub Actions - 自动文档更新工作流

## 工作流概览

```
代码提交(Push/PR)
      │
      ▼
┌─────────────────┐
│ 1. 代码检出     │
└────────┬────────┘
         │
         ▼
┌─────────────────┐
│ 2. 生成API文档  │ ──▶ Swagger JSON/YAML
└────────┬────────┘
         │
         ▼
┌─────────────────┐
│ 3. 生成组件文档 │ ──▶ Storybook 静态页面
└────────┬────────┘
         │
         ▼
┌─────────────────┐
│ 4. 生成数据库文档│ ──▶ Markdown DDL
└────────┬────────┘
         │
         ▼
┌─────────────────┐
│ 5. 更新开发手册 │
└────────┬────────┘
         │
         ▼
┌─────────────────┐
│ 6. 提交到GitHub │
└────────┬────────┘
         │
         ▼
   文档自动更新完成 ✅
```

## 完整的工作流文件

### .github/workflows/auto-doc-update.yml

```yaml
name: 自动文档更新

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'material-system-server/src/main/java/**/*.java'
      - 'material-system/src/**/*.vue'
      - 'material-system/src/**/*.ts'
      - 'docs/**'
      
  pull_request:
    branches:
      - main
      - develop
      
  workflow_dispatch:  # 手动触发

jobs:
  # ==================== 后端文档更新 ====================
  backend-doc-update:
    name: 更新后端文档
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        
      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: 生成 API 文档
        run: |
          cd material-system-server
          mvn springdoc-openapi:dossier
          
      - name: 更新 Swagger JSON
        run: |
          # 复制生成的 Swagger JSON 到 docs
          cp material-system-server/target/api-docs.json docs/generated/api-docs.json
          
      - name: 更新 API 手册
        run: |
          python3 scripts/generate_api_docs.py \
            --input docs/generated/api-docs.json \
            --output docs/API手册.md
            
      - name: 生成数据库文档
        run: |
          cd material-system-server
          mvn mybatis-plus-generator:code
          
      - name: 提交文档更新
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: 自动更新后端API和数据库文档"
          file_pattern: |
            docs/API手册.md
            docs/generated/*.json
            
  # ==================== 前端文档更新 ====================
  frontend-doc-update:
    name: 更新前端文档
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: material-system/package-lock.json
          
      - name: 安装依赖
        run: |
          cd material-system
          npm ci
          
      - name: 生成组件文档
        run: |
          cd material-system
          npm run build-storybook
          
      - name: 部署 Storybook
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: material-system/storybook-static
          target-folder: storybook
          
      - name: 更新组件文档索引
        run: |
          python3 scripts/generate_component_docs.py \
            --input material-system/src/components \
            --output docs/generated/components.json
            
      - name: 提交文档更新
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: 自动更新前端组件文档"
          file_pattern: |
            docs/generated/*.json
            
  # ==================== 更新开发手册 ====================
  update-dev-handbook:
    name: 更新开发手册
    runs-on: ubuntu-latest
    needs: [backend-doc-update, frontend-doc-update]
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        
      - name: 生成完整的开发手册
        run: |
          python3 scripts/merge_docs.py \
            --backend docs/API手册.md \
            --frontend docs/generated/components.json \
            --database docs/generated/database.md \
            --output docs/开发手册.md
            
      - name: 检查文档变更
        run: |
          if git diff --name-only | grep -q "docs/开发手册.md"; then
            echo "DOCS_UPDATED=true" >> $GITHUB_ENV
          else
            echo "DOCS_UPDATED=false" >> $GITHUB_ENV
          fi
          
      - name: 提交文档更新
        if: env.DOCS_UPDATED == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: 自动更新开发手册"
          file_pattern: docs/开发手册.md
          
  # ==================== 生成变更报告 ====================
  generate-changelog:
    name: 生成变更报告
    runs-on: ubuntu-latest
    needs: [update-dev-handbook]
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: 生成变更报告
        run: |
          git log --oneline -10 > docs/generated/changelog.txt
          
      - name: 创建 Pull Request 注释
        if: github.event_name == 'pull_request'
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          COMMENT="## 📚 文档自动更新报告
          
          本次提交已自动更新以下文档：
          
          - ✅ API手册 (Swagger)
          - ✅ 数据库文档 (DDL)
          - ✅ 前端组件文档 (Storybook)
          - ✅ 开发手册 (完整合并)
          
          查看更新: [开发手册](docs/开发手册.md)
          查看API文档: http://localhost:8080/swagger-ui.html
          查看组件文档: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/storybook
          
          *此报告由 GitHub Actions 自动生成*"
          
          echo "$COMMENT" | gh pr comment $PR_NUMBER --body-file -
          
      - name: 提交变更报告
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: 生成变更报告"
          file_pattern: docs/generated/changelog.txt
```

## 辅助脚本

### scripts/generate_api_docs.py

```python
#!/usr/bin/env python3
"""
从 Swagger JSON 自动生成 Markdown API 文档
"""

import json
import sys
from pathlib import Path
from datetime import datetime
from typing import Dict, List, Any


def parse_swagger_json(json_path: str) -> Dict[str, Any]:
    """解析 Swagger JSON 文件"""
    with open(json_path, 'r', encoding='utf-8') as f:
        return json.load(f)


def generate_markdown(api_data: Dict[str, Any], output_path: str):
    """生成 Markdown API 文档"""
    
    info = api_data.get('info', {})
    title = info.get('title', 'API 文档')
    version = info.get('version', '1.0.0')
    description = info.get('description', '')
    
    # 收集所有路径
    paths = api_data.get('paths', {})
    tags = api_data.get('tags', [])
    
    # 按标签分组
    tag_groups = {}
    for path, methods in paths.items():
        for method, details in methods.items():
            if method.upper() in ['GET', 'POST', 'PUT', 'DELETE', 'PATCH']:
                method_details = details
                method_tags = method_details.get('tags', ['未分类'])
                
                for tag in method_tags:
                    if tag not in tag_groups:
                        tag_groups[tag] = []
                    tag_groups[tag].append({
                        'path': path,
                        'method': method.upper(),
                        'details': method_details
                    })
    
    # 生成 Markdown
    md_content = f"""# {title}

> 版本: {version} | 自动生成时间: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}

{description}

---

## 目录

"""
    
    # 添加目录
    for i, tag in enumerate(tag_groups.keys(), 1):
        md_content += f"{i}. [{tag}](#{tag.lower().replace(' ', '-')})\n"
    
    md_content += "\n---\n\n"
    
    # 生成每个标签的文档
    for tag, endpoints in tag_groups.items():
        md_content += f"## {tag}\n\n"
        
        for endpoint in endpoints:
            path = endpoint['path']
            method = endpoint['method']
            details = endpoint['details']
            
            summary = details.get('summary', '无描述')
            description = details.get('description', '')
            parameters = details.get('parameters', [])
            request_body = details.get('requestBody', {})
            responses = details.get('responses', {})
            
            # 接口地址
            md_content += f"### {method} {path}\n\n"
            md_content += f"**{summary}**\n\n"
            
            if description:
                md_content += f"{description}\n\n"
            
            # 请求参数
            if parameters:
                md_content += "**请求参数**:\n\n"
                md_content += "| 参数名 | 类型 | 必填 | 说明 |\n"
                md_content += "|--------|------|------|------|\n"
                
                for param in parameters:
                    name = param.get('name', '')
                    param_type = param.get('schema', {}).get('type', 'string')
                    required = '是' if param.get('required', False) else '否'
                    desc = param.get('description', '')
                    
                    md_content += f"| {name} | {param_type} | {required} | {desc} |\n"
                
                md_content += "\n"
            
            # 请求体
            if request_body:
                md_content += "**请求体**:\n\n"
                content = request_body.get('content', {})
                if 'application/json' in content:
                    schema = content['application/json'].get('schema', {})
                    md_content += f"```json\n{json.dumps(schema, indent=2, ensure_ascii=False)}\n```\n\n"
            
            # 响应
            if responses:
                md_content += "**响应示例**:\n\n"
                md_content += "| 状态码 | 说明 |\n"
                md_content += "|--------|------|\n"
                
                for status, resp in responses.items():
                    desc = resp.get('description', '')
                    md_content += f"| {status} | {desc} |\n"
                
                md_content += "\n"
            
            md_content += "---\n\n"
    
    # 写入文件
    with open(output_path, 'w', encoding='utf-8') as f:
        f.write(md_content)
    
    print(f"✅ API 文档已生成: {output_path}")


if __name__ == '__main__':
    import argparse
    
    parser = argparse.ArgumentParser(description='生成 API 文档')
    parser.add_argument('--input', required=True, help='Swagger JSON 文件路径')
    parser.add_argument('--output', required=True, help='输出 Markdown 文件路径')
    
    args = parser.parse_args()
    
    api_data = parse_swagger_json(args.input)
    generate_markdown(api_data, args.output)
```

### scripts/merge_docs.py

```python
#!/usr/bin/env python3
"""
合并所有文档生成完整的开发手册
"""

import sys
from pathlib import Path
from datetime import datetime


def merge_docs(backend_path: str, frontend_path: str, 
               database_path: str, output_path: str):
    """合并所有文档"""
    
    output = f"""# 材料申请管理系统 - 开发手册

> 版本: v4.0 | 自动生成: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}

---

## 📖 文档说明

本文档由以下部分自动合并生成：

- ✅ 后端 API 文档 (从 Swagger JSON 自动提取)
- ✅ 前端组件文档 (从 Storybook 自动提取)
- ✅ 数据库文档 (从实体类自动提取)
- ✅ 手动维护的架构和设计文档

> ⚠️ **注意**: 此文档由 CI/CD 自动更新，**请勿手动编辑**
> 如需修改，请编辑对应的源文档并提交代码

---

"""
    
    # 读取后端 API 文档
    if Path(backend_path).exists():
        with open(backend_path, 'r', encoding='utf-8') as f:
            backend_content = f.read()
        output += backend_content
        output += "\n\n---\n\n"
    else:
        output += "## 后端 API 文档\n\n"
        output += "*后端 API 文档将在构建时自动生成*\n\n---\n\n"
    
    # 读取前端组件文档
    if Path(frontend_path).exists():
        with open(frontend_path, 'r', encoding='utf-8') as f:
            frontend_content = f.read()
        output += frontend_content
        output += "\n\n---\n\n"
    else:
        output += "## 前端组件文档\n\n"
        output += "*前端组件文档将在构建时自动生成*\n\n---\n\n"
    
    # 读取数据库文档
    if Path(database_path).exists():
        with open(database_path, 'r', encoding='utf-8') as f:
            database_content = f.read()
        output += database_content
    else:
        output += "## 数据库文档\n\n"
        output += "*数据库文档将在构建时自动生成*\n\n"
    
    # 写入输出文件
    with open(output_path, 'w', encoding='utf-8') as f:
        f.write(output)
    
    print(f"✅ 开发手册已生成: {output_path}")


if __name__ == '__main__':
    import argparse
    
    parser = argparse.ArgumentParser(description='合并文档生成开发手册')
    parser.add_argument('--backend', required=True, help='后端 API 文档路径')
    parser.add_argument('--frontend', required=True, help='前端组件文档路径')
    parser.add_argument('--database', required=True, help='数据库文档路径')
    parser.add_argument('--output', required=True, help='输出文件路径')
    
    args = parser.parse_args()
    
    merge_docs(args.backend, args.frontend, args.database, args.output)
```

### scripts/generate_component_docs.py

```python
#!/usr/bin/env python3
"""
从 Vue 组件生成组件文档索引
"""

import json
import sys
from pathlib import Path
from typing import Dict, List


def scan_components(component_dir: str) -> List[Dict]:
    """扫描组件目录"""
    components = []
    
    for vue_file in Path(component_dir).rglob('*.vue'):
        component_info = {
            'name': vue_file.stem,
            'path': str(vue_file.relative_to(component_dir)),
            'type': 'layout' if 'layout' in str(vue_file) else 'common'
        }
        
        # 读取文件内容
        with open(vue_file, 'r', encoding='utf-8') as f:
            content = f.read()
            
            # 提取描述
            if '<template>' in content:
                component_info['has_template'] = True
            
            if '<script' in content:
                component_info['has_script'] = True
            
            if '<style' in content:
                component_info['has_style'] = True
        
        components.append(component_info)
    
    return components


def generate_component_json(component_dir: str, output_path: str):
    """生成组件文档 JSON"""
    
    components = scan_components(component_dir)
    
    output = {
        'generated_at': str(Path(output_path).stat().st_mtime),
        'total': len(components),
        'components': components
    }
    
    with open(output_path, 'w', encoding='utf-8') as f:
        json.dump(output, f, indent=2, ensure_ascii=False)
    
    print(f"✅ 组件文档已生成: {output_path}")


if __name__ == '__main__':
    import argparse
    
    parser = argparse.ArgumentParser(description='生成组件文档索引')
    parser.add_argument('--input', required=True, help='组件目录路径')
    parser.add_argument('--output', required=True, help='输出 JSON 文件路径')
    
    args = parser.parse_args()
    
    generate_component_json(args.input, args.output)
```

## 使用说明

### 1. 启用自动化文档

```bash
# 1. 创建工作流目录
mkdir -p .github/workflows
mkdir -p scripts

# 2. 复制工作流文件
cp docs/auto-doc-update.yml .github/workflows/
cp docs/generate_api_docs.py scripts/
cp docs/merge_docs.py scripts/
cp docs/generate_component_docs.py scripts/

# 3. 设置执行权限
chmod +x scripts/*.py

# 4. 提交代码
git add .
git commit -m "feat: 添加自动文档更新系统"
git push
```

### 2. 手动触发文档更新

```bash
# 通过 GitHub CLI 触发
gh workflow run auto-doc-update.yml

# 或通过 Web 界面触发
# 访问: Actions -> 自动文档更新 -> Run workflow
```

### 3. 查看生成的文档

| 文档类型 | 生成方式 | 查看地址 |
|----------|----------|----------|
| API文档 | Swagger UI | http://localhost:8080/swagger-ui.html |
| 组件文档 | Storybook | http://localhost:6006 |
| 开发手册 | 自动合并 | docs/开发手册.md |
| 数据库文档 | 自动生成 | docs/generated/database.md |

## 触发条件

| 事件 | 触发内容 | 说明 |
|------|----------|------|
| Push到main/develop | 全部文档更新 | 代码合并时触发 |
| 提交PR | 变更报告 | 生成 PR 评论 |
| 手动触发 | 全部文档更新 | 调试用 |
| 修改docs目录 | 对应文档更新 | 文档变更时触发 |

## 注意事项

### ⚠️ 重要提示

1. **自动生成部分请勿手动编辑**
   - docs/API手册.md (由 generate_api_docs.py 自动生成)
   - docs/开发手册.md (由 merge_docs.py 自动合并)
   - docs/generated/ (自动生成的临时文件)

2. **手动维护部分**
   - docs/architecture/ (架构设计文档)
   - docs/功能开发文档.XXX.md (功能开发子文档)

3. **文档优先级**
   ```
   手动文档 > 自动生成文档
   ```

### 🔧 常见问题

#### Q: 文档没有自动更新?

A: 检查以下几点:
1. GitHub Actions 是否启用
2. 提交信息是否包含触发路径
3. 查看 Actions 日志排查错误

#### Q: 如何禁用自动文档?

A: 删除 `.github/workflows/auto-doc-update.yml` 文件

#### Q: 如何单独更新某个文档?

A: 使用手动触发:
```bash
gh workflow run auto-doc-update.yml --ref develop
```

## 最佳实践

### ✅ 推荐做法

1. **保持文档源单一**
   - 每个内容只在一处维护
   - 自动生成的部分不要手动修改

2. **频繁更新组件注释**
   - 组件的 JSDoc 要及时更新
   - 方便 Storybook 自动生成文档

3. **定期 Review 自动生成的文档**
   - 每周检查一次自动生成的文档
   - 确保内容正确

4. **使用 CI 状态徽章**
   ```markdown
   ![文档自动更新](https://github.com/用户名/仓库名/actions/workflows/auto-doc-update.yml/badge.svg)
   ```

### ❌ 不推荐做法

1. **不要在自动生成的文件中添加手写内容**
   - 自动生成后会被覆盖

2. **不要禁用 CI 自动更新**
   - 会导致文档不同步

3. **不要提交过大的文档**
   - GitHub Actions 有文件大小限制

## 监控和维护

### 📊 监控指标

| 指标 | 说明 | 检查频率 |
|------|------|----------|
| CI 成功率 | Actions 执行成功率 | 每次提交 |
| 文档覆盖度 | 自动生成内容比例 | 每周 |
| 文档更新延迟 | 代码提交到文档更新的时间 | 每次提交 |

### 🔧 维护任务

| 任务 | 频率 | 说明 |
|------|------|------|
| 检查 CI 日志 | 每周 | 确保流程正常 |
| Review 生成的文档 | 每周 | 确保内容正确 |
| 更新脚本 | 按需 | 根据反馈优化 |
| 备份文档 | 每月 | 防止丢失 |

