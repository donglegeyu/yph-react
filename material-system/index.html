<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/src/assets/vite.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星际VUE</title>
    <!-- IconPark 图标库 (CDN) -->
    <script src="https://lf1-cdn-tos.bytegoofy.com/obj/iconpark/svg_43217_171.57d626ea470afdc06c519a374a29d06c.js"></script>
    <script>
      (function() {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', '/iconpark/sprite_nav.svg', true);
        xhr.onload = function() {
          if (xhr.status === 200) {
            var div = document.createElement('div');
            div.innerHTML = xhr.responseText;
            div.style.display = 'none';
            document.body.appendChild(div);
          }
        };
        xhr.send();
      })();
    </script>
    <!-- 本地图标 sprite -->
    <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
      <symbol id="star-fill" viewBox="0 0 48 48">
        <path fill="currentColor" d="m23.999 5-6.113 12.478L4 19.49l10.059 9.834L11.654 43 24 36.42 36.345 43 33.96 29.325 44 19.491l-13.809-2.013L24 5Z"/>
      </symbol>
      <symbol id="down" viewBox="0 0 48 48" fill="none">
        <path stroke-linejoin="round" stroke-linecap="round" stroke-width="4" stroke="currentColor" d="M16 18l8 8 8-8" data-follow-stroke="currentColor"/>
      </symbol>
      <symbol id="drag" viewBox="0 0 48 48" fill="none">
        <path stroke-linejoin="round" stroke-linecap="round" stroke-width="3" stroke="currentColor" d="M10 12h28M10 24h28M10 36h28" data-follow-stroke="currentColor"/>
      </symbol>
      <symbol id="up" viewBox="0 0 48 48" fill="none">
        <path stroke-linejoin="round" stroke-linecap="round" stroke-width="4" stroke="currentColor" d="m24 14 9 9-9 9-9-9 9-9Z" data-follow-stroke="currentColor"/>
      </symbol>
      <symbol id="close" viewBox="0 0 48 48" fill="none">
        <path stroke-linejoin="round" stroke-linecap="round" stroke-width="4" stroke="currentColor" d="m8 8 32 32M8 40 40 8" data-follow-stroke="currentColor"/>
      </symbol>
      <symbol id="id-card-v-klbe0a04" viewBox="0 0 48 48" fill="none">
        <rect stroke-linejoin="round" stroke-width="1.5" stroke="currentColor" rx="2" height="40" width="32" y="4" x="8" data-follow-stroke="currentColor"/>
        <path stroke-linejoin="round" stroke-width="1.5" stroke="currentColor" d="M24 19a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" data-follow-stroke="currentColor"/>
        <path stroke-linejoin="round" stroke-linecap="round" stroke-width="1.5" stroke="currentColor" d="M30 25a6 6 0 0 0-12 0m0 6h12m-12 6h7" data-follow-stroke="currentColor"/>
      </symbol>
      <!-- 调色板图标 - 主题设置 -->
      <symbol id="palette" viewBox="0 0 48 48" fill="none">
        <path stroke-linejoin="round" stroke-linecap="round" stroke-width="2" stroke="currentColor" d="M24 4C13 4 4 13 4 24s9 20 20 20c2.4 0 4-.6 5.4-1.4-.4-1.2-.4-2.4 0-3.6.6-1.8 1.6-3.4 1.6-5 0-4-3-7-7-7-.4 0-.8 0-1.2.2C20.6 5.6 18.2 4 16 4c-6.6 0-12 5.4-12 12s5.4 12 12 12c5.6 0 10.4-3.8 11.6-9 .2-.8.2-1.6.2-2.4 0-.2 0-.4-.2-.6" data-follow-stroke="currentColor"/>
        <path stroke-linejoin="round" stroke-width="2" stroke="currentColor" d="M31 14c1 0 2 .4 3 1.2 1 .6 1.8 1.4 2.2 2.4.6 1.8.2 3.6-.8 5-1.4 2.2-3.8 3.4-6 3.4s-4.6-1.2-6-3.4" data-follow-stroke="currentColor"/>
        <path stroke-linecap="round" stroke-width="2" stroke="currentColor" d="M12 28c1-1 2-2 4-2" data-follow-stroke="currentColor"/>
      </symbol>
      <!-- 主题设置图标 (IconPark) -->
      <symbol id="theme" viewBox="0 0 48 48" fill="none">
        <path stroke-linejoin="round" stroke-width="4" stroke="currentColor" d="M18 6a6 6 0 0 0 12 0h5.455L42 15.818l-5.727 4.91V42H11.727V20.727L6 15.818 12.546 6H18Z" data-follow-stroke="currentColor"/>
      </symbol>
      <!-- 退出登录图标 (IconPark) -->
      <symbol id="logout" viewBox="0 0 48 48" fill="none">
        <path stroke-linejoin="round" stroke-linecap="round" stroke-width="4" stroke="currentColor" d="M23.992 6H6v36h18m9-9 9-9-9-9m-17 8.992h26" data-follow-stroke="currentColor"/>
      </symbol>
    </svg>
    <!-- 全局图标样式：强制所有 SVG 图标使用 currentColor -->
    <style>
      svg[class*="icon"], svg[class*="Icon"], svg[fill="none"], svg[class*="menu-icon"] {
        stroke: currentColor !important;
        fill: none !important;
      }
      /* star-fill 图标：使用填充，不使用描边 */
      .star-icon use.star-fill,
      .favorite-icon.favorited use {
        fill: currentColor !important;
        stroke: none !important;
      }
      /* 菜单选中时：收藏图标显示主色 */
      .menu-item.active .star-icon use,
      .child.active .favorite-icon use {
        fill: #F95914 !important;
        stroke: none !important;
      }
      /* 强制 svg use 元素颜色 */
      svg use {
        stroke: currentColor !important;
        fill: inherit !important;
      }
      /* 强制 SVG symbol 内部元素 */
      svg symbol * {
        stroke: currentColor !important;
        fill: inherit !important;
      }
      /* 设置和刷新图标强制16px */
      button.icon-only-btn svg {
        width: 16px !important;
        height: 16px !important;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
